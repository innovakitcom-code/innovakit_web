<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - Innovakit</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        * { font-family: 'Inter', sans-serif; }
        .sidebar { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }
        .nav-item { transition: all 0.3s ease; }
        .nav-item.active { background: rgba(59,130,246,0.2); border-left: 4px solid #3b82f6; }
        .card { transition: transform 0.2s, box-shadow 0.2s; }
        .card:hover { transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
        .btn-primary { background: #3b82f6; color: white; padding: 8px 16px; border-radius: 8px; transition: all 0.3s ease; }
        .btn-primary:hover { background: #2563eb; transform: translateY(-1px); }
        .btn-danger { background: #ef4444; color: white; padding: 8px 16px; border-radius: 8px; transition: all 0.3s ease; }
        .btn-danger:hover { background: #dc2626; }
        .btn-success { background: #10b981; color: white; padding: 8px 16px; border-radius: 8px; transition: all 0.3s ease; }
        .btn-success:hover { background: #059669; }
        .modal { transition: opacity 0.3s ease; }
        input, select, textarea { border: 1px solid #e2e8f0; border-radius: 8px; padding: 8px 12px; width: 100%; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #3b82f6; }
        
        /* Botón flotante admin (solo visible cuando estás en el index y eres admin) */
        .admin-float-btn {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: #7eb74a;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            z-index: 1000;
        }
        .admin-float-btn:hover {
            transform: scale(1.1);
            background: #5a8f32;
        }
    </style>
</head>
<body class="bg-gray-100">
    
    <!-- ========================================== -->
    <!-- PANTALLA DE LOGIN (visible inicialmente) -->
    <!-- ========================================== -->
    <div id="login-screen" class="flex items-center justify-center min-h-screen bg-gray-100">
        <div class="bg-white rounded-2xl shadow-xl max-w-md w-full mx-4 p-8">
            <div class="text-center mb-6">
                <h1 class="text-3xl font-bold">
                    <span style="color:#7eb74a">Inn</span><span style="color:#fdc344">o</span><span style="color:#7eb74a">va</span><span class="text-blue-600">kit</span>
                </h1>
                <p class="text-gray-500 mt-2">Panel de Administración</p>
            </div>
            
            <div id="login-error" class="hidden mb-4 p-3 bg-red-100 text-red-700 rounded-lg text-sm"></div>
            
            <form id="admin-login-form">
                <div class="mb-4">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Email</label>
                    <input type="email" id="admin-email" placeholder="admin@innovakit.com" class="w-full" required>
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Contraseña</label>
                    <input type="password" id="admin-password" placeholder="••••••••" class="w-full" required>
                </div>
                <button type="submit" id="login-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg font-semibold transition">
                    Ingresar al Panel
                </button>
            </form>
            <p class="text-center text-gray-500 text-sm mt-6">
                <a href="/" class="text-blue-600 hover:underline">← Volver a la tienda</a>
            </p>
        </div>
    </div>
    
    <!-- ========================================== -->
    <!-- PANEL ADMIN (oculto hasta login exitoso) -->
    <!-- ========================================== -->
    <div id="admin-panel" class="hidden">
        <div class="flex min-h-screen">
            <!-- Sidebar -->
            <div class="sidebar w-64 fixed h-full text-white">
                <div class="p-6 border-b border-gray-700">
                    <h1 class="text-2xl font-bold">
                        
                         <span style="color:#7eb74a">Inn</span><span style="color:#fdc344">o</span><span style="color:#7eb74a">va</span><span class="text-blue-500">kit</span>
                        <span class="text-xs block text-gray-400 mt-1">Panel Admin</span>
                    </h1>
                </div>
                
                <nav class="p-4 space-y-1">
                    <button onclick="cargarDashboard()" id="nav-dashboard" class="nav-item w-full text-left px-4 py-3 rounded-lg flex items-center gap-3 hover:bg-gray-700 transition">
                        <i class="fas fa-chart-line w-5"></i> Dashboard
                    </button>
                    <button onclick="cargarProductos()" id="nav-productos" class="nav-item w-full text-left px-4 py-3 rounded-lg flex items-center gap-3 hover:bg-gray-700 transition">
                        <i class="fas fa-microchip w-5"></i> Productos
                    </button>
                    <button onclick="cargarKits()" id="nav-kits" class="nav-item w-full text-left px-4 py-3 rounded-lg flex items-center gap-3 hover:bg-gray-700 transition">
                        <i class="fas fa-box w-5"></i> Kits
                    </button>
                    <button onclick="cargarReviews()" id="nav-reviews" class="nav-item w-full text-left px-4 py-3 rounded-lg flex items-center gap-3 hover:bg-gray-700 transition">
                        <i class="fas fa-star w-5"></i> Reviews
                    </button>
                    <button onclick="cargarPedidos()" id="nav-pedidos" class="nav-item w-full text-left px-4 py-3 rounded-lg flex items-center gap-3 hover:bg-gray-700 transition">
                        <i class="fas fa-shopping-cart w-5"></i> Pedidos
                    </button>
                    <button onclick="cargarUsuarios()" id="nav-usuarios" class="nav-item w-full text-left px-4 py-3 rounded-lg flex items-center gap-3 hover:bg-gray-700 transition">
                        <i class="fas fa-users w-5"></i> Usuarios
                    </button>
                </nav>
                
                <div class="absolute bottom-0 w-64 p-4 border-t border-gray-700">
                    <div class="flex items-center gap-3 mb-3">
                        <i class="fas fa-user-circle text-2xl"></i>
                        <div>
                            <p id="admin-nombre" class="font-semibold">Administrador</p>
                            <p id="admin-email" class="text-xs text-gray-400"></p>
                        </div>
                    </div>
                    <button onclick="cerrarSesionAdmin()" class="w-full bg-red-600 hover:bg-red-700 text-white py-2 rounded-lg transition">
                        <i class="fas fa-sign-out-alt mr-2"></i> Cerrar sesión
                    </button>
                </div>
            </div>
            
            <!-- Contenido principal -->
            <div class="ml-64 flex-1 p-8">
                <div id="contenido-principal">
                    <div class="text-center py-12">
                        <i class="fas fa-spinner fa-spin text-3xl text-blue-600"></i>
                        <p class="mt-2 text-gray-500">Cargando...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Modal para producto -->
    <div id="modal-producto" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-2xl max-w-2xl w-full mx-4 max-h-[90vh] overflow-y-auto">
            <div class="p-6">
                <div class="flex justify-between items-center mb-4">
                    <h3 id="modal-titulo" class="text-2xl font-bold">Agregar Producto</h3>
                    <button onclick="cerrarModalProducto()" class="text-2xl">&times;</button>
                </div>
                <form id="form-producto">
                    <input type="hidden" id="producto-id">
                    <div class="mb-4"><label class="block text-sm font-semibold mb-1">Nombre *</label><input type="text" id="prod-nombre" required class="w-full"></div>
                    <div class="mb-4"><label class="block text-sm font-semibold mb-1">Descripción</label><textarea id="prod-descripcion" rows="4" class="w-full"></textarea></div>
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div><label class="block text-sm font-semibold mb-1">Precio (Gs.) *</label><input type="number" id="prod-precio" required class="w-full"></div>
                        <div><label class="block text-sm font-semibold mb-1">Categoría</label><input type="text" id="prod-categoria" class="w-full"></div>
                    </div>
                    <div class="mb-4"><label class="block text-sm font-semibold mb-1">Imagen principal</label><input type="text" id="prod-imagen" placeholder="comp/producto.webp" class="w-full"></div>
                    <div class="mb-4"><label class="block text-sm font-semibold mb-1">Especificaciones (una por línea)</label><textarea id="prod-especificaciones" rows="5" class="w-full"></textarea></div>
                    <div class="mb-4"><label class="flex items-center gap-2"><input type="checkbox" id="prod-stock" checked> <span class="text-sm font-semibold">Producto disponible</span></label></div>
                    <div class="flex gap-3"><button type="submit" class="flex-1 btn-primary">Guardar</button><button type="button" onclick="cerrarModalProducto()" class="flex-1 bg-gray-300 hover:bg-gray-400 py-2 rounded-lg">Cancelar</button></div>
                </form>
            </div>
        </div>
    </div>
    
    <script>
        // ============================================
        // CONFIGURACIÓN DE SUPABASE
        // ============================================
        const SUPABASE_URL = 'https://lvdjczfblanbadikccxo.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_O9oR1xmyeAy1ludJJlo3Rw_2gW9XZ_F';
        const supabaseAdmin = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let usuarioAdmin = null;
        let productos = [];
        
        // ============================================
        // LOGIN ADMIN
        // ============================================
        document.getElementById('admin-login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('admin-email').value;
            const password = document.getElementById('admin-password').value;
            const loginBtn = document.getElementById('login-btn');
            const errorDiv = document.getElementById('login-error');
            
            loginBtn.textContent = 'Verificando...';
            loginBtn.disabled = true;
            errorDiv.classList.add('hidden');
            
            try {
                // 1. Iniciar sesión
                const { data, error } = await supabaseAdmin.auth.signInWithPassword({ email, password });
                if (error) throw error;
                
                // 2. Verificar si es admin
                const { data: perfil, error: perfilError } = await supabaseAdmin
                    .from('perfiles')
                    .select('*')
                    .eq('id', data.user.id)
                    .single();
                
                if (perfilError || !perfil?.es_admin) {
                    await supabaseAdmin.auth.signOut();
                    throw new Error('No tienes permisos de administrador');
                }
                
                // 3. Guardar datos del admin
                usuarioAdmin = { id: data.user.id, email: data.user.email, nombre: perfil.nombre };
                document.getElementById('admin-nombre').textContent = usuarioAdmin.nombre;
                document.getElementById('admin-email').textContent = usuarioAdmin.email;
                
                // 4. Mostrar panel
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
                
                // 5. Cargar dashboard
                cargarDashboard();
                
            } catch (error) {
                errorDiv.textContent = error.message;
                errorDiv.classList.remove('hidden');
                loginBtn.textContent = 'Ingresar al Panel';
                loginBtn.disabled = false;
            }
        });
        
        function cerrarSesionAdmin() {
            supabaseAdmin.auth.signOut();
            location.reload();
        }
        
        // ============================================
        // DASHBOARD
        // ============================================
        async function cargarDashboard() {
            activarNav('dashboard');
            const { count: productosCount } = await supabaseAdmin.from('productos').select('*', { count: 'exact', head: true });
            const { count: kitsCount } = await supabaseAdmin.from('kits').select('*', { count: 'exact', head: true });
            const { count: pedidosCount } = await supabaseAdmin.from('pedidos').select('*', { count: 'exact', head: true });
            const { count: reviewsPendientes } = await supabaseAdmin.from('reviews').select('*', { count: 'exact', head: true }).eq('aprobada', false);
            
            document.getElementById('contenido-principal').innerHTML = `
                <h2 class="text-3xl font-bold mb-6">Dashboard</h2>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                    <div class="bg-white p-6 rounded-xl shadow"><i class="fas fa-microchip text-3xl text-blue-600"></i><p class="text-2xl font-bold mt-2">${productosCount || 0}</p><p class="text-gray-600">Productos</p></div>
                    <div class="bg-white p-6 rounded-xl shadow"><i class="fas fa-box text-3xl text-green-600"></i><p class="text-2xl font-bold mt-2">${kitsCount || 0}</p><p class="text-gray-600">Kits</p></div>
                    <div class="bg-white p-6 rounded-xl shadow"><i class="fas fa-shopping-cart text-3xl text-orange-600"></i><p class="text-2xl font-bold mt-2">${pedidosCount || 0}</p><p class="text-gray-600">Pedidos</p></div>
                    <div class="bg-white p-6 rounded-xl shadow"><i class="fas fa-star text-3xl text-yellow-500"></i><p class="text-2xl font-bold mt-2">${reviewsPendientes || 0}</p><p class="text-gray-600">Reviews pendientes</p></div>
                </div>
            `;
        }
        
        // ============================================
        // PRODUCTOS
        // ============================================
        async function cargarProductos() {
            activarNav('productos');
            const { data } = await supabaseAdmin.from('productos').select('*').order('id', { ascending: false });
            productos = data || [];
            
            document.getElementById('contenido-principal').innerHTML = `
                <div class="flex justify-between items-center mb-6"><h2 class="text-3xl font-bold">Productos</h2><button onclick="abrirModalProducto()" class="btn-primary"><i class="fas fa-plus"></i> Nuevo</button></div>
                <div class="bg-white rounded-xl shadow overflow-hidden">
                    <table class="w-full"><thead class="bg-gray-50 border-b"><tr><th class="p-3 text-left">ID</th><th class="p-3 text-left">Nombre</th><th class="p-3 text-left">Precio</th><th class="p-3 text-left">Stock</th><th class="p-3 text-left">Acciones</th></tr></thead>
                    <tbody>${productos.map(p => `<tr class="border-b"><td class="p-3">${p.id}</td><td class="p-3">${p.nombre}</td><td class="p-3">${p.precio.toLocaleString()} Gs.</td><td class="p-3">${p.stock ? '✔ Disponible' : '✖ Sin stock'}</td><td class="p-3"><button onclick="editarProducto(${p.id})" class="text-blue-600 mr-2"><i class="fas fa-edit"></i></button><button onclick="eliminarProducto(${p.id})" class="text-red-600"><i class="fas fa-trash"></i></button></td></tr>`).join('')}</tbody>
                    </table>
                </div>
            `;
        }
        
        function abrirModalProducto(producto = null) {
            document.getElementById('modal-titulo').textContent = producto ? 'Editar Producto' : 'Agregar Producto';
            document.getElementById('producto-id').value = producto?.id || '';
            document.getElementById('prod-nombre').value = producto?.nombre || '';
            document.getElementById('prod-descripcion').value = producto?.descripcion || '';
            document.getElementById('prod-precio').value = producto?.precio || '';
            document.getElementById('prod-categoria').value = producto?.categoria || '';
            document.getElementById('prod-imagen').value = producto?.imagen_principal || '';
            document.getElementById('prod-especificaciones').value = (producto?.especificaciones || []).join('\n');
            document.getElementById('prod-stock').checked = producto?.stock !== false;
            document.getElementById('modal-producto').classList.remove('hidden');
            document.getElementById('modal-producto').style.display = 'flex';
        }
        
        function cerrarModalProducto() {
            document.getElementById('modal-producto').classList.add('hidden');
            document.getElementById('modal-producto').style.display = 'none';
            document.getElementById('form-producto').reset();
        }
        
        document.getElementById('form-producto').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('producto-id').value;
            const data = {
                nombre: document.getElementById('prod-nombre').value,
                descripcion: document.getElementById('prod-descripcion').value,
                precio: parseInt(document.getElementById('prod-precio').value),
                categoria: document.getElementById('prod-categoria').value,
                imagen_principal: document.getElementById('prod-imagen').value,
                especificaciones: document.getElementById('prod-especificaciones').value.split('\n').filter(s => s.trim()),
                stock: document.getElementById('prod-stock').checked,
                activo: true
            };
            if (id) await supabaseAdmin.from('productos').update(data).eq('id', id);
            else await supabaseAdmin.from('productos').insert([data]);
            cerrarModalProducto();
            cargarProductos();
        });
        
        async function editarProducto(id) { abrirModalProducto(productos.find(p => p.id === id)); }
        async function eliminarProducto(id) { if (confirm('¿Eliminar?')) { await supabaseAdmin.from('productos').update({ activo: false }).eq('id', id); cargarProductos(); } }
        
        async function cargarKits() { activarNav('kits'); document.getElementById('contenido-principal').innerHTML = '<h2 class="text-3xl font-bold mb-6">Kits</h2><div class="bg-white rounded-xl shadow p-8 text-center">Próximamente</div>'; }
        async function cargarReviews() { activarNav('reviews'); document.getElementById('contenido-principal').innerHTML = '<h2 class="text-3xl font-bold mb-6">Reviews</h2><div class="bg-white rounded-xl shadow p-8 text-center">Próximamente</div>'; }
        async function cargarPedidos() { activarNav('pedidos'); document.getElementById('contenido-principal').innerHTML = '<h2 class="text-3xl font-bold mb-6">Pedidos</h2><div class="bg-white rounded-xl shadow p-8 text-center">Próximamente</div>'; }
        async function cargarUsuarios() { activarNav('usuarios'); document.getElementById('contenido-principal').innerHTML = '<h2 class="text-3xl font-bold mb-6">Usuarios</h2><div class="bg-white rounded-xl shadow p-8 text-center">Próximamente</div>'; }
        
        function activarNav(seccion) { document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active')); document.getElementById(`nav-${seccion}`)?.classList.add('active'); }
    </script>
</body>
</html>
