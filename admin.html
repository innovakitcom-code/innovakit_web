<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - Innovakit</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        * { font-family: 'Inter', sans-serif; }
        .sidebar { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }
        .nav-item { transition: all 0.3s ease; }
        .nav-item.active { background: rgba(59,130,246,0.2); border-left: 4px solid #3b82f6; }
        .card { transition: transform 0.2s, box-shadow 0.2s; }
        .card:hover { transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
        .btn-primary { background: #3b82f6; color: white; padding: 8px 16px; border-radius: 8px; transition: all 0.3s ease; }
        .btn-primary:hover { background: #2563eb; transform: translateY(-1px); }
        .btn-danger { background: #ef4444; color: white; padding: 8px 16px; border-radius: 8px; transition: all 0.3s ease; }
        .btn-danger:hover { background: #dc2626; }
        .btn-success { background: #10b981; color: white; padding: 8px 16px; border-radius: 8px; transition: all 0.3s ease; }
        .btn-success:hover { background: #059669; }
        .modal { transition: opacity 0.3s ease; }
        input, select, textarea { border: 1px solid #e2e8f0; border-radius: 8px; padding: 8px 12px; width: 100%; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #3b82f6; ring: 2px solid #3b82f6; }
    </style>
</head>
<body class="bg-gray-100">
    
    <!-- Pantalla de carga -->
    <div id="loading-screen" class="fixed inset-0 bg-white z-50 flex items-center justify-center">
        <div class="text-center">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto mb-4"></div>
            <p class="text-gray-600">Verificando acceso...</p>
        </div>
    </div>
    
    <!-- Panel Admin (oculto inicialmente) -->
    <div id="admin-panel" class="hidden">
        <!-- Sidebar -->
        <div class="flex min-h-screen">
            <div class="sidebar w-64 fixed h-full text-white">
                <div class="p-6 border-b border-gray-700">
                    <h1 class="text-2xl font-bold">
                        <span style="color:#7eb74a">Innova</span><span class="text-blue-400">kit</span>
                        <span class="text-xs block text-gray-400 mt-1">Panel Admin</span>
                    </h1>
                </div>
                
                <nav class="p-4 space-y-1">
                    <button onclick="cargarDashboard()" id="nav-dashboard" class="nav-item w-full text-left px-4 py-3 rounded-lg flex items-center gap-3 hover:bg-gray-700 transition">
                        <i class="fas fa-chart-line w-5"></i> Dashboard
                    </button>
                    <button onclick="cargarProductos()" id="nav-productos" class="nav-item w-full text-left px-4 py-3 rounded-lg flex items-center gap-3 hover:bg-gray-700 transition">
                        <i class="fas fa-microchip w-5"></i> Productos
                    </button>
                    <button onclick="cargarKits()" id="nav-kits" class="nav-item w-full text-left px-4 py-3 rounded-lg flex items-center gap-3 hover:bg-gray-700 transition">
                        <i class="fas fa-box w-5"></i> Kits
                    </button>
                    <button onclick="cargarReviews()" id="nav-reviews" class="nav-item w-full text-left px-4 py-3 rounded-lg flex items-center gap-3 hover:bg-gray-700 transition">
                        <i class="fas fa-star w-5"></i> Reviews
                    </button>
                    <button onclick="cargarPedidos()" id="nav-pedidos" class="nav-item w-full text-left px-4 py-3 rounded-lg flex items-center gap-3 hover:bg-gray-700 transition">
                        <i class="fas fa-shopping-cart w-5"></i> Pedidos
                    </button>
                    <button onclick="cargarUsuarios()" id="nav-usuarios" class="nav-item w-full text-left px-4 py-3 rounded-lg flex items-center gap-3 hover:bg-gray-700 transition">
                        <i class="fas fa-users w-5"></i> Usuarios
                    </button>
                </nav>
                
                <div class="absolute bottom-0 w-64 p-4 border-t border-gray-700">
                    <div class="flex items-center gap-3 mb-3">
                        <i class="fas fa-user-circle text-2xl"></i>
                        <div>
                            <p id="admin-nombre" class="font-semibold">Administrador</p>
                            <p id="admin-email" class="text-xs text-gray-400">admin@innovakit.com</p>
                        </div>
                    </div>
                    <button onclick="cerrarSesion()" class="w-full bg-red-600 hover:bg-red-700 text-white py-2 rounded-lg transition">
                        <i class="fas fa-sign-out-alt mr-2"></i> Cerrar sesión
                    </button>
                </div>
            </div>
            
            <!-- Contenido principal -->
            <div class="ml-64 flex-1 p-8">
                <div id="contenido-principal">
                    <!-- El contenido se carga dinámicamente -->
                </div>
            </div>
        </div>
    </div>
    
    <!-- Modal para agregar/editar producto -->
    <div id="modal-producto" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-2xl max-w-2xl w-full mx-4 max-h-[90vh] overflow-y-auto">
            <div class="p-6">
                <div class="flex justify-between items-center mb-4">
                    <h3 id="modal-titulo" class="text-2xl font-bold">Agregar Producto</h3>
                    <button onclick="cerrarModalProducto()" class="text-2xl">&times;</button>
                </div>
                <form id="form-producto">
                    <input type="hidden" id="producto-id">
                    
                    <div class="mb-4">
                        <label class="block text-sm font-semibold mb-1">Nombre *</label>
                        <input type="text" id="prod-nombre" required class="w-full">
                    </div>
                    
                    <div class="mb-4">
                        <label class="block text-sm font-semibold mb-1">Descripción</label>
                        <textarea id="prod-descripcion" rows="4" class="w-full"></textarea>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div>
                            <label class="block text-sm font-semibold mb-1">Precio (Gs.) *</label>
                            <input type="number" id="prod-precio" required class="w-full">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold mb-1">Categoría</label>
                            <input type="text" id="prod-categoria" placeholder="Ej: Sensores, Placas" class="w-full">
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label class="block text-sm font-semibold mb-1">Imagen principal</label>
                        <input type="text" id="prod-imagen" placeholder="comp/producto.webp" class="w-full">
                        <p class="text-xs text-gray-500 mt-1">Ruta relativa a la raíz del sitio</p>
                    </div>
                    
                    <div class="mb-4">
                        <label class="block text-sm font-semibold mb-1">Especificaciones (una por línea)</label>
                        <textarea id="prod-especificaciones" rows="5" class="w-full" placeholder="Microcontrolador ATmega328P&#10;14 pines digitales&#10;6 pines analógicos"></textarea>
                    </div>
                    
                    <div class="mb-4">
                        <label class="flex items-center gap-2">
                            <input type="checkbox" id="prod-stock" checked> 
                            <span class="text-sm font-semibold">Producto disponible</span>
                        </label>
                    </div>
                    
                    <div class="flex gap-3">
                        <button type="submit" class="flex-1 btn-primary">Guardar</button>
                        <button type="button" onclick="cerrarModalProducto()" class="flex-1 bg-gray-300 hover:bg-gray-400 text-gray-800 py-2 rounded-lg">Cancelar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <script>
        // ============================================
        // CONFIGURACIÓN DE SUPABASE
        // ============================================
        const SUPABASE_URL = 'https://lvdjczfblanbadikccxo.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_O9oR1xmyeAy1ludJJlo3Rw_2gW9XZ_F';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let usuarioActual = null;
        let productos = [];
        let kits = [];
        
        // ============================================
        // VERIFICAR ACCESO ADMIN
        // ============================================
        async function verificarAcceso() {
            const { data: { user } } = await supabase.auth.getUser();
            
            if (!user) {
                window.location.href = '/';
                return;
            }
            
            const { data: perfil } = await supabase
                .from('perfiles')
                .select('*')
                .eq('id', user.id)
                .single();
            
            if (!perfil?.es_admin) {
                alert('No tienes permisos de administrador');
                window.location.href = '/';
                return;
            }
            
            usuarioActual = {
                id: user.id,
                email: user.email,
                nombre: perfil.nombre
            };
            
            document.getElementById('admin-nombre').textContent = usuarioActual.nombre;
            document.getElementById('admin-email').textContent = usuarioActual.email;
            document.getElementById('loading-screen').classList.add('hidden');
            document.getElementById('admin-panel').classList.remove('hidden');
            
            cargarDashboard();
        }
        
        // ============================================
        // DASHBOARD
        // ============================================
        async function cargarDashboard() {
            activarNav('dashboard');
            
            const { count: productosCount } = await supabase.from('productos').select('*', { count: 'exact', head: true });
            const { count: kitsCount } = await supabase.from('kits').select('*', { count: 'exact', head: true });
            const { count: pedidosCount } = await supabase.from('pedidos').select('*', { count: 'exact', head: true });
            const { count: reviewsPendientes } = await supabase.from('reviews').select('*', { count: 'exact', head: true }).eq('aprobada', false);
            const { count: usuariosCount } = await supabase.from('perfiles').select('*', { count: 'exact', head: true });
            
            document.getElementById('contenido-principal').innerHTML = `
                <h2 class="text-3xl font-bold mb-6">Dashboard</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-6 mb-8">
                    <div class="card bg-white p-6 rounded-xl shadow">
                        <i class="fas fa-microchip text-3xl text-blue-600 mb-2"></i>
                        <p class="text-2xl font-bold">${productosCount || 0}</p>
                        <p class="text-gray-600">Productos</p>
                    </div>
                    <div class="card bg-white p-6 rounded-xl shadow">
                        <i class="fas fa-box text-3xl text-green-600 mb-2"></i>
                        <p class="text-2xl font-bold">${kitsCount || 0}</p>
                        <p class="text-gray-600">Kits</p>
                    </div>
                    <div class="card bg-white p-6 rounded-xl shadow">
                        <i class="fas fa-shopping-cart text-3xl text-orange-600 mb-2"></i>
                        <p class="text-2xl font-bold">${pedidosCount || 0}</p>
                        <p class="text-gray-600">Pedidos</p>
                    </div>
                    <div class="card bg-white p-6 rounded-xl shadow">
                        <i class="fas fa-star text-3xl text-yellow-500 mb-2"></i>
                        <p class="text-2xl font-bold">${reviewsPendientes || 0}</p>
                        <p class="text-gray-600">Reviews pendientes</p>
                    </div>
                    <div class="card bg-white p-6 rounded-xl shadow">
                        <i class="fas fa-users text-3xl text-purple-600 mb-2"></i>
                        <p class="text-2xl font-bold">${usuariosCount || 0}</p>
                        <p class="text-gray-600">Usuarios</p>
                    </div>
                </div>
                <div class="bg-white rounded-xl shadow p-6">
                    <h3 class="font-bold text-lg mb-4">Bienvenido al Panel de Administración</h3>
                    <p class="text-gray-600">Desde aquí puedes gestionar productos, kits, reviews y pedidos de Innovakit.</p>
                </div>
            `;
        }
        
        // ============================================
        // PRODUCTOS
        // ============================================
        async function cargarProductos() {
            activarNav('productos');
            
            const { data, error } = await supabase
                .from('productos')
                .select('*')
                .order('id', { ascending: false });
            
            if (error) {
                console.error(error);
                return;
            }
            
            productos = data;
            
            document.getElementById('contenido-principal').innerHTML = `
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-3xl font-bold">Productos</h2>
                    <button onclick="abrirModalProducto()" class="btn-primary flex items-center gap-2">
                        <i class="fas fa-plus"></i> Nuevo producto
                    </button>
                </div>
                <div class="bg-white rounded-xl shadow overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <thead class="bg-gray-50 border-b">
                                <tr>
                                    <th class="text-left p-3">ID</th>
                                    <th class="text-left p-3">Imagen</th>
                                    <th class="text-left p-3">Nombre</th>
                                    <th class="text-left p-3">Precio</th>
                                    <th class="text-left p-3">Stock</th>
                                    <th class="text-left p-3">Acciones</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${productos.map(p => `
                                    <tr class="border-b hover:bg-gray-50">
                                        <td class="p-3">${p.id}</td>
                                        <td class="p-3"><img src="${p.imagen_principal || 'img/placeholder.png'}" class="w-10 h-10 object-contain"></td>
                                        <td class="p-3">${p.nombre}</td>
                                        <td class="p-3 text-green-600">${p.precio.toLocaleString()} Gs.</td>
                                        <td class="p-3">${p.stock ? '<span class="text-green-600">✔ Disponible</span>' : '<span class="text-red-600">✖ Sin stock</span>'}</td>
                                        <td class="p-3">
                                            <button onclick="editarProducto(${p.id})" class="text-blue-600 mr-2"><i class="fas fa-edit"></i></button>
                                            <button onclick="eliminarProducto(${p.id})" class="text-red-600"><i class="fas fa-trash"></i></button>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }
        
        function abrirModalProducto(producto = null) {
            document.getElementById('modal-titulo').textContent = producto ? 'Editar Producto' : 'Agregar Producto';
            document.getElementById('producto-id').value = producto?.id || '';
            document.getElementById('prod-nombre').value = producto?.nombre || '';
            document.getElementById('prod-descripcion').value = producto?.descripcion || '';
            document.getElementById('prod-precio').value = producto?.precio || '';
            document.getElementById('prod-categoria').value = producto?.categoria || '';
            document.getElementById('prod-imagen').value = producto?.imagen_principal || '';
            document.getElementById('prod-especificaciones').value = (producto?.especificaciones || []).join('\n');
            document.getElementById('prod-stock').checked = producto?.stock !== false;
            document.getElementById('modal-producto').classList.remove('hidden');
            document.getElementById('modal-producto').style.display = 'flex';
        }
        
        function cerrarModalProducto() {
            document.getElementById('modal-producto').classList.add('hidden');
            document.getElementById('modal-producto').style.display = 'none';
            document.getElementById('form-producto').reset();
        }
        
        document.getElementById('form-producto').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const id = document.getElementById('producto-id').value;
            const nombre = document.getElementById('prod-nombre').value;
            const descripcion = document.getElementById('prod-descripcion').value;
            const precio = parseInt(document.getElementById('prod-precio').value);
            const categoria = document.getElementById('prod-categoria').value;
            const imagen_principal = document.getElementById('prod-imagen').value;
            const especificaciones = document.getElementById('prod-especificaciones').value.split('\n').filter(s => s.trim());
            const stock = document.getElementById('prod-stock').checked;
            
            const productoData = { nombre, descripcion, precio, categoria, imagen_principal, especificaciones, stock, activo: true };
            
            if (id) {
                await supabase.from('productos').update(productoData).eq('id', id);
                alert('Producto actualizado');
            } else {
                await supabase.from('productos').insert([productoData]);
                alert('Producto creado');
            }
            
            cerrarModalProducto();
            cargarProductos();
        });
        
        async function editarProducto(id) {
            const producto = productos.find(p => p.id === id);
            if (producto) abrirModalProducto(producto);
        }
        
        async function eliminarProducto(id) {
            if (confirm('¿Eliminar este producto?')) {
                await supabase.from('productos').update({ activo: false }).eq('id', id);
                alert('Producto eliminado');
                cargarProductos();
            }
        }
        
        // ============================================
        // KITS
        // ============================================
        async function cargarKits() {
            activarNav('kits');
            
            const { data, error } = await supabase.from('kits').select('*');
            
            if (error) {
                console.error(error);
                return;
            }
            
            kits = data;
            
            document.getElementById('contenido-principal').innerHTML = `
                <h2 class="text-3xl font-bold mb-6">Kits</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    ${kits.map(k => `
                        <div class="bg-white rounded-xl shadow p-6">
                            <img src="${k.imagen_portada || 'img/placeholder.png'}" class="w-full h-40 object-cover rounded-lg mb-4">
                            <h3 class="font-bold text-xl mb-2">${k.nombre}</h3>
                            <p class="text-gray-600 mb-4">${k.descripcion || 'Kit educativo de electrónica'}</p>
                            <button onclick="alert('Edición de kits próximamente')" class="btn-primary w-full">Editar kit</button>
                        </div>
                    `).join('')}
                </div>
            `;
        }
        
        // ============================================
        // REVIEWS
        // ============================================
        async function cargarReviews() {
            activarNav('reviews');
            
            const { data, error } = await supabase
                .from('reviews')
                .select('*, perfiles(nombre)')
                .eq('aprobada', false)
                .order('created_at', { ascending: false });
            
            if (error) {
                console.error(error);
                return;
            }
            
            document.getElementById('contenido-principal').innerHTML = `
                <h2 class="text-3xl font-bold mb-6">Reviews Pendientes</h2>
                ${data.length === 0 ? '<div class="bg-white rounded-xl shadow p-8 text-center text-gray-500">No hay reviews pendientes</div>' : `
                    <div class="space-y-4">
                        ${data.map(r => `
                            <div class="bg-white rounded-xl shadow p-6">
                                <div class="flex justify-between items-start mb-3">
                                    <div>
                                        <div class="flex items-center gap-2 mb-1">
                                            <span class="font-semibold">${r.perfiles?.nombre || 'Anónimo'}</span>
                                            <span class="text-yellow-500">${'★'.repeat(r.rating)}${'☆'.repeat(5 - r.rating)}</span>
                                        </div>
                                        <p class="text-gray-700">${r.comentario}</p>
                                    </div>
                                    <div class="flex gap-2">
                                        <button onclick="aprobarReview(${r.id})" class="btn-success px-3 py-1 text-sm">Aprobar</button>
                                        <button onclick="rechazarReview(${r.id})" class="btn-danger px-3 py-1 text-sm">Rechazar</button>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `}
            `;
        }
        
        async function aprobarReview(id) {
            await supabase.from('reviews').update({ aprobada: true }).eq('id', id);
            alert('Review aprobada');
            cargarReviews();
        }
        
        async function rechazarReview(id) {
            if (confirm('¿Rechazar esta review?')) {
                await supabase.from('reviews').delete().eq('id', id);
                alert('Review rechazada');
                cargarReviews();
            }
        }
        
        // ============================================
        // PEDIDOS
        // ============================================
        async function cargarPedidos() {
            activarNav('pedidos');
            
            const { data, error } = await supabase
                .from('pedidos')
                .select('*, perfiles(nombre)')
                .order('created_at', { ascending: false });
            
            if (error) {
                console.error(error);
                return;
            }
            
            document.getElementById('contenido-principal').innerHTML = `
                <h2 class="text-3xl font-bold mb-6">Pedidos</h2>
                ${data.length === 0 ? '<div class="bg-white rounded-xl shadow p-8 text-center text-gray-500">No hay pedidos aún</div>' : `
                    <div class="space-y-4">
                        ${data.map(p => `
                            <div class="bg-white rounded-xl shadow p-6">
                                <div class="flex justify-between items-start mb-3">
                                    <div>
                                        <p class="font-semibold">${p.perfiles?.nombre || 'Cliente'}</p>
                                        <p class="text-sm text-gray-500">${new Date(p.created_at).toLocaleString()}</p>
                                    </div>
                                    <span class="px-3 py-1 rounded-full text-sm ${p.estado === 'pendiente' ? 'bg-yellow-100 text-yellow-800' : 'bg-green-100 text-green-800'}">
                                        ${p.estado}
                                    </span>
                                </div>
                                <div class="border-t pt-3">
                                    <p class="font-bold text-green-600">Total: ${p.total?.toLocaleString() || 0} Gs.</p>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `}
            `;
        }
        
        // ============================================
        // USUARIOS
        // ============================================
        async function cargarUsuarios() {
            activarNav('usuarios');
            
            const { data, error } = await supabase
                .from('perfiles')
                .select('*')
                .order('created_at', { ascending: false });
            
            if (error) {
                console.error(error);
                return;
            }
            
            document.getElementById('contenido-principal').innerHTML = `
                <h2 class="text-3xl font-bold mb-6">Usuarios Registrados</h2>
                <div class="bg-white rounded-xl shadow overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <thead class="bg-gray-50 border-b">
                                <tr>
                                    <th class="text-left p-3">Nombre</th>
                                    <th class="text-left p-3">Email</th>
                                    <th class="text-left p-3">Teléfono</th>
                                    <th class="text-left p-3">Admin</th>
                                    <th class="text-left p-3">Registro</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${data.map(u => `
                                    <tr class="border-b hover:bg-gray-50">
                                        <td class="p-3">${u.nombre || '—'}</td>
                                        <td class="p-3">${u.id} (ver en Auth)</td>
                                        <td class="p-3">${u.telefono || '—'}</td>
                                        <td class="p-3">${u.es_admin ? '<span class="text-green-600">✓ Sí</span>' : '<span class="text-gray-500">—</span>'}</td>
                                        <td class="p-3">${new Date(u.created_at).toLocaleDateString()}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }
        
        // ============================================
        // UTILIDADES
        // ============================================
        function activarNav(seccion) {
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            document.getElementById(`nav-${seccion}`)?.classList.add('active');
        }
        
        function cerrarSesion() {
            supabase.auth.signOut();
            window.location.href = '/';
        }
        
        // Inicializar
        verificarAcceso();
    </script>
</body>
